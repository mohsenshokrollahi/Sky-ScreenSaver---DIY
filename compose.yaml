# New Skyline — aircraft tracker on HDMI TV via Raspberry Pi.
#
#   docker compose up -d --build
#   open http://<host>:3000/        (display)  ·  /control  (phone panel)
#
# Uses the free airplanes.live API — no radio hardware required.

services:
  new-skyline:
    build: .
    image: new-skyline
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATA_SOURCE: api
      # Add your own hostname or public IP if you expose this beyond the LAN:
      # ALLOWED_HOSTS: 203.0.113.42
    volumes:
      # Persist config.json + route/TLE caches across restarts.
      - new-skyline-data:/app/server/data
      # Persist logs.
      - new-skyline-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  new-skyline-data:
  new-skyline-logs:
